name = "figager-relay"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Hard cap CPU per invocation so a single request can never run away (relay ops use <1ms).
[limits]
cpu_ms = 50

[[durable_objects.bindings]]
name = "RELAY"
class_name = "Relay"

# SQLite-backed Durable Objects are available on the Workers FREE plan.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Relay"]
